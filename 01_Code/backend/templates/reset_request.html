{% extends 'base.html' %}
{% block title %}Reset Password | ClarifAI{% endblock %}
{% block content %}
<section class="auth-stack-shell">
    <div class="auth-icon-badge"><i data-lucide="brain"></i></div>
    <h2 class="auth-title">Forgot Password</h2>
    <p class="auth-subtitle">Enter your registered email to start the recovery process.</p>

    <form method="post" class="auth-panel auth-form-panel">
        <label class="label">Registered Email Address</label>
        <input type="email" name="email" placeholder="your@ca.edu" required>

        <div class="auth-action-stack">
            <button class="btn primary full" type="submit">Continue →</button>
            <a class="btn ghost full" href="{{ url_for('auth.login') }}">← Back to Sign In</a>
        </div>
    </form>
</section>
{% endblock %}
