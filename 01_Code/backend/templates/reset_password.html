{% extends 'base.html' %}
{% block title %}New Password | ClarifAI{% endblock %}
{% block content %}
<section class="auth-stack-shell">
    <div class="auth-icon-badge"><i data-lucide="key-round"></i></div>
    <h2 class="auth-title auth-title-compact">Password Reset - Step 3</h2>
    <p class="auth-subtitle">Set your new password.</p>

    <form method="post" class="auth-panel auth-form-panel auth-form">
        <label class="label">New Password</label>
        <div class="password-row compact">
            <input type="password" name="password" id="resetPassword" autocomplete="new-password" required>
            <button class="password-peek-btn" type="button" data-toggle-password="resetPassword" aria-label="Show password" title="Show password"><i data-lucide="eye"></i></button>
        </div>

        <label class="label">Confirm Password</label>
        <div class="password-row compact">
            <input type="password" name="confirm_password" id="resetConfirmPassword" autocomplete="new-password" required>
            <button class="password-peek-btn" type="button" data-toggle-password="resetConfirmPassword" aria-label="Show password" title="Show password"><i data-lucide="eye"></i></button>
        </div>

        <div class="auth-action-row">
            <button class="btn primary" type="submit">Update Password</button>
            <a class="btn ghost" href="{{ url_for('auth.login') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
